name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reviews_user
          POSTGRES_PASSWORD: reviews_pass
          POSTGRES_DB: product_reviews
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://reviews_user:reviews_pass@localhost:5432/product_reviews

      - name: Seed database
        run: npx prisma db seed
        env:
          DATABASE_URL: postgresql://reviews_user:reviews_pass@localhost:5432/product_reviews

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --coverage

      - name: E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://reviews_user:reviews_pass@localhost:5432/product_reviews
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret
          PORT: 3000

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build --configuration=production

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build containers
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for healthy
        run: |
          echo "Waiting for services..."
          sleep 15
          curl --retry 10 --retry-delay 3 --retry-all-errors -f http://localhost:3000/api/products || exit 1

      - name: Verify API responds
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/api/products)
          echo "API responded with: $STATUS"
          [ "$STATUS" = "200" ] || exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v
